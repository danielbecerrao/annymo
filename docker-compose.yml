services:
  fullstack:
    build:
      context: ./fullstack
      dockerfile: Dockerfile
    container_name: fullstack
    restart: unless-stopped
    env_file:
      - ./fullstack/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fullstack_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fullstack_db
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 300
      WATCHPACK_POLLING: "true"
      TSC_WATCHFILE: FixedPollingInterval
      TSC_WATCHDIRECTORY: FixedPollingInterval
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./fullstack:/app
      - fullstack_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run start:docker"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullstack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullstack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    env_file:
      - ./automatizacion/.env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: fullstack_db
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: postgres
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      TZ: America/Bogota
      GENERIC_TIMEZONE: America/Bogota
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  fullstack_node_modules:
  n8n_data:

services:
  fullstack:
    build:
      context: ./fullstack
      dockerfile: Dockerfile
    container_name: fullstack
    restart: unless-stopped
    env_file:
      - ./fullstack/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fullstack_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fullstack_db
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 300
      WATCHPACK_POLLING: "true"
      TSC_WATCHFILE: FixedPollingInterval
      TSC_WATCHDIRECTORY: FixedPollingInterval
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./fullstack:/app
      - fullstack_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run start:docker"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullstack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullstack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  fullstack_node_modules:
